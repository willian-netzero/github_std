# Code Reviewer Agent (AI-Powered) — GitHub Actions Workflow
# Copy to .github/workflows/agent-code-reviewer.yml
# Requires ANTHROPIC_API_KEY in repository secrets
name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    # Don't run on draft PRs or dependabot
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic httpx

      - name: Copy agent files
        run: |
          # If using a monorepo with agents/ at root:
          # cp -r agents/code-reviewer .code-reviewer
          # cp -r agents/shared .shared
          #
          # If agents are in a separate repo, clone them:
          # git clone --depth 1 https://github.com/netzero-hq/dev-agents.git /tmp/agents

          echo "Agent files ready."

      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import os, json, httpx, anthropic

          repo = '${{ github.repository }}'
          pr_number = ${{ github.event.pull_request.number }}
          head_sha = '${{ github.event.pull_request.head.sha }}'

          headers = {
              'Authorization': f'Bearer {os.environ[\"GITHUB_TOKEN\"]}',
              'Accept': 'application/vnd.github+json',
          }

          # Get the diff
          diff_resp = httpx.get(
              f'https://api.github.com/repos/{repo}/pulls/{pr_number}',
              headers={**headers, 'Accept': 'application/vnd.github.diff'},
          )
          diff = diff_resp.text[:80000]

          # Get changed files
          files_resp = httpx.get(
              f'https://api.github.com/repos/{repo}/pulls/{pr_number}/files',
              headers=headers,
          )
          files = files_resp.json()
          file_list = '\n'.join(f'- {f[\"filename\"]}' for f in files)

          # Call Claude
          client = anthropic.Anthropic()
          resp = client.messages.create(
              model='claude-sonnet-4-20250514',
              max_tokens=3000,
              system='You are a senior code reviewer. Review this PR diff. Be constructive and specific. Focus on bugs, architecture, and security. Output a markdown summary.',
              messages=[{
                  'role': 'user',
                  'content': f'Review this PR.\n\nChanged files:\n{file_list}\n\nDiff:\n\`\`\`diff\n{diff}\n\`\`\`'
              }],
          )
          review = resp.content[0].text

          # Post comment
          marker = '<!-- agent:code-reviewer -->'
          body = f'{marker}\n## AI Code Review\n\n{review}\n\n---\n<sub>Generated by NetZero Code Reviewer</sub>'

          # Check for existing comment
          comments = httpx.get(
              f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments',
              headers=headers,
          ).json()

          existing = next((c for c in comments if marker in c.get('body', '')), None)
          if existing:
              httpx.patch(
                  f'https://api.github.com/repos/{repo}/issues/comments/{existing[\"id\"]}',
                  headers=headers,
                  json={'body': body},
              )
          else:
              httpx.post(
                  f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments',
                  headers=headers,
                  json={'body': body},
              )

          print('Review posted successfully.')
          "
