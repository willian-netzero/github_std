# PR Summarizer Agent (AI-Powered) — GitHub Actions Workflow
# Copy to .github/workflows/agent-pr-summarizer.yml
# Requires ANTHROPIC_API_KEY in repository secrets
name: PR Summary

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    name: Generate PR Summary
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic httpx

      - name: Generate and post summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import os, json, httpx, anthropic

          repo = '${{ github.repository }}'
          pr_number = ${{ github.event.pull_request.number }}

          headers = {
              'Authorization': f'Bearer {os.environ[\"GITHUB_TOKEN\"]}',
              'Accept': 'application/vnd.github+json',
          }

          # Get diff and files
          diff = httpx.get(
              f'https://api.github.com/repos/{repo}/pulls/{pr_number}',
              headers={**headers, 'Accept': 'application/vnd.github.diff'},
          ).text[:60000]

          files = httpx.get(
              f'https://api.github.com/repos/{repo}/pulls/{pr_number}/files',
              headers=headers,
          ).json()

          file_list = '\n'.join(
              f'- \`{f[\"filename\"]}\` ({f.get(\"status\",\"modified\")}, +{f.get(\"additions\",0)}/-{f.get(\"deletions\",0)})'
              for f in files
          )

          # Detect stacks
          stacks = set()
          for f in files:
              name = f['filename']
              if name.endswith('.py'): stacks.add('Python')
              elif name.endswith(('.ts','.tsx','.js','.jsx')): stacks.add('JS/TS')
              elif name.endswith('.tlpp'): stacks.add('TLPP')
              elif 'flows/' in name: stacks.add('Node-RED')

          client = anthropic.Anthropic()
          resp = client.messages.create(
              model='claude-sonnet-4-20250514',
              max_tokens=1500,
              system='Summarize this PR. Output: 1) one paragraph summary, 2) risk level (LOW/MEDIUM/HIGH) with reason, 3) which layers are touched. Be concise.',
              messages=[{
                  'role': 'user',
                  'content': f'Files:\n{file_list}\n\nStacks: {stacks}\n\nDiff:\n{diff}'
              }],
          )

          summary = resp.content[0].text
          stacks_str = ', '.join(stacks) if stacks else 'Unknown'

          marker = '<!-- agent:pr-summarizer -->'
          body = f'{marker}\n## PR Summary\n\n{summary}\n\n**Stacks:** {stacks_str}\n\n---\n<sub>Generated by NetZero PR Summarizer</sub>'

          httpx.post(
              f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments',
              headers=headers,
              json={'body': body},
          )
          print('Summary posted.')
          "
